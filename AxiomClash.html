<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Clash - RPG Battle</title>
    <link rel="icon" type="image/gif" href="assets/icon.gif">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CUSTOM FONT LOADER --- */
        @font-face {
            font-family: 'CustomPixelFont';
            src: url('assets/myfont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-dark: #0f0a1a;
            --pixel-gold: #ffd700;
            --pixel-hp: #e74c3c;
            --pixel-mp: #3498db;
            --panel: #161b22;
            --rps-text-color: #3B2F1E;
            --rps-border: #2F2F2F;
            --rps-border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            font-family: 'CustomPixelFont', sans-serif;
            color: white;
            overflow: hidden;
            image-rendering: pixelated;
            cursor: url('assets/cursor.png'), auto;
        }

        button,
        .menu-item,
        .pause-menu-item,
        .cc,
        .cancel-target,
        .targetable,
        #pause-btn,
        .close-x,
        .pick-hand,
        #new-game-btn,
        .close-btn {
            cursor: url('assets/cursor_pointer.png'), pointer !important;
            outline: none;
            pointer-events: auto;
        }

        /* SCREEN VISIBILITY */
        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
        }

        .hidden {
            display: none !important;
        }

        .paused-anim * {
            animation-play-state: paused !important;
        }

        /* TRANSITIONS */
        .iris-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-shadow: 0 0 0 300vw #000;
            background: transparent;
            z-index: 9999;
            pointer-events: none;
            width: 300vw;
            height: 300vw;
        }

        .iris-closing {
            animation: irisClose 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: all;
        }

        .iris-opening {
            animation: irisOpen 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            pointer-events: none;
        }

        @keyframes irisClose {
            0% {
                width: 300vw;
                height: 300vw;
            }

            100% {
                width: 0px;
                height: 0px;
            }
        }

        @keyframes irisOpen {
            0% {
                width: 0px;
                height: 0px;
            }

            100% {
                width: 300vw;
                height: 300vw;
            }
        }

        /* MENUS & PARALLAX */
        #menuScreen {
            background-color: #87CEEB;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #menu-scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            image-rendering: pixelated;
        }

        #layer-sky {
            background-image: url('assets/sky.png');
        }

        #layer-grass {
            background-image: url('assets/grass.png');
        }

        #layer-tree {
            background-image: url('assets/tree.png');
        }

        #layer-flowers {
            background-image: url('assets/flowers.png');
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.5) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .title-container,
        .press-start-wrap {
            position: relative;
            z-index: 10;
            pointer-events: auto;
            text-align: center;
        }

        .game-title {
            font-size: clamp(2.5rem, 9vw, 5rem);
            color: var(--pixel-gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 4px 4px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000;
            margin-bottom: 60px;
            animation: titleFloat 3s ease-in-out infinite;
        }

        .press-start-text {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            animation: blink 1s step-end infinite;
            cursor: pointer;
            pointer-events: auto;
            padding: 30px;
            font-weight: bold;
            display: inline-block;
        }

        .press-start-text span {
            color: #ffffff;
        }

        /* WEBLINK ICON */
        .weblink-icon {
            width: 64px;
            height: 64px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
        }

        .weblink-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .social-links-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }


        /* INFO ICON */
        .info-icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #3498db;
            border: 2px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            vertical-align: middle;
            margin-left: 10px;
            line-height: 1;
            pointer-events: all;
            position: relative;
            z-index: 50;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .info-icon-btn:hover {
            background: var(--pixel-gold);
            transform: scale(1.2);
        }

        .cc-name {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #menu-cat {
            position: absolute;
            right: 22%;
            bottom: 15%;
            width: 128px;
            height: 128px;
            background: url('assets/menu_cat.png') left center;
            background-size: 400% 100%;
            image-rendering: pixelated;
            z-index: 3;
            animation: catIdle 0.8s steps(4) infinite;
        }

        @keyframes catIdle {
            from {
                background-position: 0 0;
            }

            to {
                background-position: -512px 0;
            }
        }

        /* TEAM SELECT */
        #teamScreen {
            background: var(--bg-dark);
            overflow: hidden;
        }

        #teamScreen.active {
            justify-content: center;
            align-items: center;
        }

        .inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 1rem 0;
            width: 100%;
            max-height: 100vh;
        }

        .screen-title {
            color: var(--pixel-gold);
            font-size: 1.8rem;
            text-shadow: 3px 3px 0 #000;
            margin-top: 10px;
        }

        .screen-subtitle {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .creature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 800px;
            width: 100%;
            margin-bottom: 10px;
        }

        .cc {
            position: relative;
            background: transparent;
            padding: 0.5rem;
            text-align: center;
            transition: transform 0.1s;
            border: none;
            box-shadow: none;
        }

        .cc:hover {
            transform: translateY(-4px);
        }

        .portrait-frame {
            width: 110px;
            height: 154px;
            background: url('assets/20250425portraitFrame-Sheet.png') no-repeat center center;
            background-size: 100% 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 5px;
            image-rendering: pixelated;
            transition: filter 0.2s;
            overflow: hidden;
            cursor: pointer;
        }

        .portrait-frame:hover {
            transform: scale(1.05);
        }

        .cc.selected .portrait-frame {
            filter: drop-shadow(0 0 10px var(--pixel-gold));
        }

        .cc-name {
            font-size: 0.9rem;
            text-shadow: 2px 2px 0 #000;
            margin-top: 5px;
        }

        .team-preview {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: #000;
            padding: 1rem;
            border: 4px solid #4a3728;
            margin-top: 5px;
        }

        .team-slot {
            width: 75px;
            height: 105px;
            border: 2px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #555;
            image-rendering: pixelated;
            overflow: hidden;
            background: transparent;
            border-radius: 4px;
        }

        .team-slot.filled {
            border: none;
            background: url('assets/20250425portraitFrame-Sheet.png') no-repeat center center;
            background-size: 100% 100%;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }

        .btn-start {
            width: max-content;
            background: var(--pixel-gold);
            border: 4px solid #4a3728;
            color: #000;
            padding: 15px 20px;
            font-size: 1rem;
            font-family: 'CustomPixelFont', sans-serif;
            box-shadow: 0 6px 0 #000;
            transition: 0.1s;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #000;
        }

        .btn-start:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000;
        }

        .btn-start:disabled {
            background: #555;
            border-color: #333;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* BATTLE STAGE */
        #battleScreen {
            background: #000;
        }

        .stage {
            flex: 1;
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-image: url('assets/battle_bg.png');
            background-size: cover;
            background-position: top left;
            background-repeat: no-repeat;
            transition: transform 0.1s;
        }

        .stage.screen-shake {
            animation: shake 0.3s cubic-bezier(.36, .07, .19, .97) both;
        }

        #entitiesLayer {
            position: absolute;
            inset: 0;
        }

        .entity-wrap {
            position: absolute;
            width: 350px;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 5;
            transform-origin: bottom center;
        }

        .platform {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            filter: blur(2px);
        }

        .sprite {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 350px;
            z-index: 2;
            image-rendering: pixelated;
            pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
        }

        .entity-wrap.is-active {
            z-index: 50;
        }

        .entity-wrap.is-active .sprite {
            filter: drop-shadow(0 0 15px var(--pixel-gold));
        }

        /* ==========================
   BATTLE HUD (OLD LAYOUT)
   ========================== */
        #game-hud {
            position: absolute;
            inset: 0;
            z-index: 1000;
            pointer-events: none;
        }

        /* Narrator / Log */
        #battle-log-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: max-content;
            min-width: 400px;
            text-align: center;
            z-index: 105;
        }

        #battle-log {
            padding: 10px 25px;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            border-style: solid;
            border-width: 18px;
            border-image: url('assets/20240707dragon9SlicesA.png') 32 fill stretch;
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }

        /* HORIZONTAL ASCENDING STAIR-STEP TOP HUD */
        #top-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .side-hud {
            display: flex;
            flex-direction: row;
            gap: 15px;
            flex: 1;
        }
        .left-hud { justify-content: flex-start; }
        .right-hud { justify-content: flex-end; }

        .vs-text {
            position: relative;
            font-family: 'CustomPixelFont', sans-serif;
            font-size: 2.5rem;
            color: white;
            text-shadow: 4px 4px 0 #000;
            margin-top: 55px;
            flex-shrink: 0;
            padding: 0 10px;
        }

        .entity-stats {
            position: relative;
            width: 180px;
            transition: opacity 0.3s, filter 0.3s, margin 0.3s;
            flex-shrink: 0;
        }

        /* FLAT ALIGNMENT FOR ALL ENTITY STATS */
        .left-hud .entity-stats:nth-child(1) {
            margin-top: 0px;
        }

        .left-hud .entity-stats:nth-child(2) {
            margin-top: 0px;
        }

        .left-hud .entity-stats:nth-child(3) {
            margin-top: 0px;
        }

        .right-hud .entity-stats:nth-child(1) {
            margin-top: 0px;
        }

        .right-hud .entity-stats:nth-child(2) {
            margin-top: 0px;
        }

        .right-hud .entity-stats:nth-child(3) {
            margin-top: 0px;
        }

        .entity-stats.dead {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .entity-stat-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .right-hud .entity-stat-name {
            justify-content: flex-end;
        }

        /* TURN INDICATOR (Moved here from old location) */
        .turn-indicator {
            width: 24px;
            height: 24px;
            background-image: url('assets/gui_cursor00.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            visibility: hidden;
        }

        .turn-indicator.active {
            visibility: visible;
            animation: pointerBounce 0.6s ease-in-out infinite;
        }

        @keyframes pointerBounce {

            0%,
            100% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(-6px);
            }
        }

        /* BAR FRAME & STATS */
        .entity-stat-bar {
            position: relative;
            width: 100%;
            height: 26px;
            margin-bottom: 5px;
            background: url('assets/bar_frame.png') no-repeat center;
            background-size: 100% 100%;
            image-rendering: pixelated;
            overflow: hidden;
        }

        .entity-stat-track {
            position: absolute;
            left: 12px;
            right: 12px;
            top: 9px;
            height: 8px;
            background: rgba(0, 0, 0, 0.45);
        }

        .entity-stat-fill {
            position: relative;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease-out;
            border-right: 1px solid rgba(255, 255, 255, 0.85);
        }

        .entity-stat-fill.hp-fill {
            background-color: #e74c3c;
            background-image: url('assets/hp_fill.png');
            background-repeat: repeat-x;
            background-size: auto 100%;
        }

        .entity-stat-fill.mp-fill {
            background-color: #3498db;
            background-image: url('assets/mp_fill.png');
            background-repeat: repeat-x;
            background-size: auto 100%;
        }

        .stat-bar-text {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9rem;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }

        /* BOTTOM COMMAND PANEL */
        #bottom-hud {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 1000;
            pointer-events: none;
        }

        #command-panel {
            position: relative;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            width: max-content;
            min-width: 450px;
            padding: 5px 20px;
            background: transparent;
            border-style: solid;
            border-width: 10px;
            border-image: url('assets/20240707dragon9SlicesA.png') 32 fill stretch;
            z-index: 2000;
            pointer-events: none;
            opacity: 0.5;
            transition: 0.2s;
        }

        #command-panel.active-turn {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-list {
            display: flex;
            flex-direction: row;
            gap: 8px;
        }

        .menu-list.hidden {
            display: none !important;
        }

        #mainMenuBox.menu-list {
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        /* SKILLS MENU */
        #skillsMenuBox {
            position: absolute;
            left: 50%;
            bottom: 100%;
            margin-bottom: 15px;
            transform: translateX(-50%);
            width: max-content;
            min-width: 320px;
            background: transparent;
            border-style: solid;
            border-width: 10px;
            border-image: url('assets/20250420manaSoul9SlicesB-Sheet.png') 32 fill stretch;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: auto;
        }

        #skillsList {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            width: 100%;
            gap: 10px;
        }

        /* MENU ITEMS */
        .menu-item {
            font-family: 'CustomPixelFont', sans-serif;
            font-size: 1.6rem;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            padding: 5px 10px;
            transition: 0.1s;
            color: #fff;
            background: transparent;
            border: none;
            text-align: center;
            /* FIXED: Hitbox improvement */
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            min-height: 40px;
            cursor: url('assets/cursor_pointer.png'), pointer !important;
        }

        .menu-item:hover {
            color: var(--pixel-gold);
            transform: scale(1.1) translateY(-2px);
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 8px rgba(255, 215, 0, 0.6);
        }

        .menu-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        #skillsList .menu-item {
            border-style: solid;
            border-width: 14px;
            border-image: url('assets/20240707dragon9SlicesA.png') 32 fill stretch;
            justify-content: flex-start;
            gap: 15px;
            padding: 8px 12px;
        }

        .skill-icon {
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            border: 1px solid #000;
            pointer-events: none;
        }

        .skill-icon-placeholder {
            width: 24px;
            height: 24px;
            pointer-events: none;
        }

        .skill-mp-cost {
            font-size: 1rem;
            color: var(--pixel-mp);
            text-shadow: 1px 1px 0 #000;
            margin-left: auto;
            padding-left: 15px;
            pointer-events: none;
        }

        /* TARGETING */
        .targetable {
            cursor: crosshair !important;
            outline: none;
        }

        .entity-wrap.targetable:hover::after,
        .entity-wrap.targetable.focused-target::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 160px;
            background-image: url('assets/target1.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            image-rendering: pixelated;
            z-index: 100;
            pointer-events: none;
            animation: animateTargetTwoImages 0.6s infinite;
        }

        .entity-wrap.targetable:hover,
        .entity-wrap.targetable.focused-target {
            transform: translateX(-50%) scale(1.1) !important;
            z-index: 60;
        }

        @keyframes animateTargetTwoImages {

            0%,
            49% {
                background-image: url('assets/target1.png');
            }

            50%,
            100% {
                background-image: url('assets/target2.png');
            }
        }

        #targetMenuOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            z-index: 190;
            pointer-events: none;
        }

        .target-msg {
            display: block;
            font-size: 3.5rem;
            color: #ff7e78;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .cancel-target {
            font-size: 1.8rem;
            color: white;
            text-shadow: 3px 3px 0 #000;
            pointer-events: auto;
            display: inline-block;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 20px;
            border: 3px solid rgba(255, 255, 255, 0.6);
            width: max-content;
        }

        .cancel-target:hover {
            color: var(--pixel-gold);
        }


        /* PAUSE & INFO MODALS */
        /* FIXED: Pause button cursor and hitbox */
        #pause-btn {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 64px;
            height: 64px;
            background: url('assets/pause_icon.png') no-repeat center;
            background-size: contain;
            z-index: 10000;
            filter: drop-shadow(2px 2px 0 #000);
            cursor: url('assets/cursor_pointer.png'), pointer !important;
            pointer-events: auto;
        }

        #pause-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        .pause-box {
            background: url('assets/parchment.png') no-repeat center;
            background-size: 100% 100%;
            width: 350px;
            height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            filter: drop-shadow(8px 8px 0 rgba(0, 0, 0, 0.5));
            padding: 40px;
            position: relative;
        }

        .close-x {
            position: absolute;
            top: 20px;
            right: 25px;
            width: 32px;
            height: 32px;
            background: url('assets/close_icon.png') no-repeat center;
            background-size: contain;
            transition: 0.1s;
            cursor: pointer;
            z-index: 10;
            pointer-events: auto;
        }

        .close-x:hover {
            transform: scale(1.1);
        }

        .pause-title {
            font-size: 2rem;
            color: #4a3728;
            margin-bottom: 20px;
            text-shadow: 1px 1px 0 #fff;
        }

        .pause-menu-item {
            width: 220px;
            background: #69db7c;
            border: 4px solid #4a3728;
            color: #000;
            padding: 15px 0;
            text-align: center;
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2), 0 4px 0 #222;
            transition: 0.1s;
            font-size: 1.2rem;
            display: block;
            box-sizing: border-box;
            margin: 0 auto;
            pointer-events: auto;
        }

        .pause-menu-item:hover {
            background: #8ce99a;
            transform: translateY(-2px);
            box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2), 0 6px 0 #222;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* INFO MODAL */
        .modal-box {
            padding: 35px;
            width: 900px;
            max-width: 95%;
            color: #fff;
            background: transparent;
            border-style: solid;
            border-width: 18px;
            border-image: url('assets/20250420manaSoul9SlicesC-Sheet.png') 32 fill stretch;
            display: flex;
            flex-direction: column;
            max-height: 85vh;
        }

        .modal-header {
            color: var(--pixel-gold);
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0 #000;
            flex-shrink: 0;
        }

        .modal-body {
            display: flex;
            gap: 20px;
            overflow: hidden;
            flex: 1;
        }

        .info-col {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            border: 2px solid #2d2116;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .info-col h3 {
            font-size: 1rem;
            color: var(--pixel-gold);
            padding: 15px;
            text-shadow: 1px 1px 0 #000;
            margin: 0;
            text-align: center;
            border-bottom: 2px solid rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
        }

        .info-col-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .info-col-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .info-col-scroll::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .info-col-scroll::-webkit-scrollbar-thumb {
            background: var(--pixel-gold);
            border-radius: 4px;
        }

        .info-row {
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding: 15px 0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-icon-frame {
            width: 90px;
            height: 90px;
            background: url('assets/20250425compass-Sheet.png') no-repeat center center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
            image-rendering: pixelated;
            flex-shrink: 0;
        }

        .info-icon-frame canvas {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .info-skill-badge {
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 3px 6px;
            border: 1px solid #555;
            border-radius: 4px;
            color: #e8dcc4;
            white-space: nowrap;
        }

        /* FLOATING NUMBERS & GAME OVER */
        .fnum {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            font-size: 1.2rem;
            animation: numUp 1.2s ease forwards;
            text-shadow: 3px 3px 0 #000;
        }

        .fnum.dmg {
            color: #ff5252;
        }

        .fnum.heal {
            color: #69db7c;
        }

        .fnum.shld {
            color: #90caf9;
        }

        .fnum.crit {
            color: #ffd700;
            font-weight: bold;
        }

        #gameoverScreen {
            background: var(--bg-dark);
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 5000;
        }

        .go-title {
            font-size: 6rem;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .go-sub {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 30px;
        }

        #gameoverScreen .btn-start {
            width: 260px;
            font-size: 1.4rem;
            text-align: center;
            padding: 15px 0;
            display: inline-block;
        }

        /* ANIMATIONS */
        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .blinking-text {
            animation: blink 0.8s step-end infinite;
        }

        @keyframes titleFloat {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes hit {
            0% {
                transform: translateX(-50%);
                filter: brightness(1);
            }

            50% {
                transform: translateX(calc(-50% - 15px));
                filter: brightness(2) drop-shadow(0 0 10px red);
            }

            100% {
                transform: translateX(-50%);
                filter: brightness(1);
            }
        }

        @keyframes hitE {
            0% {
                transform: translateX(-50%);
                filter: brightness(1);
            }

            50% {
                transform: translateX(calc(-50% + 15px));
                filter: brightness(2) drop-shadow(0 0 10px red);
            }

            100% {
                transform: translateX(-50%);
                filter: brightness(1);
            }
        }

        @keyframes numUp {
            0% {
                opacity: 1;
                transform: translate(-50%, 0);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -80px);
            }
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* VFX */
        @keyframes vfxSpawn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .vfx-sprite {
            position: absolute;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 120;
            image-rendering: pixelated;
        }

        .vfx-sprite.heal {
            animation: vfxSpawn 1.2s ease-out forwards;
        }

        .vfx-sprite.slash {
            animation: vfxSpawn 0.675s ease-out forwards;
        }

        .vfx-sprite.smoke {
            animation: vfxSpawn 0.8s ease-out forwards;
        }

        .vfx-sprite.mage-hit {
            animation: vfxSpawn 0.375s ease-out forwards;
        }

        .vfx-sprite.explosion {
            animation: vfxSpawn 1.125s ease-out forwards;
        }

        /* RPS */
        #rpsScreen {
            background-image: url('assets/battle_bg.png');
            background-size: cover;
            background-position: bottom;
        }

        #rpsScreen h1,
        #rpsScreen p {
            font-family: 'CustomPixelFont', sans-serif;
        }

        .pick-hand-menu {
            position: fixed;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1;
            transition: background 160ms steps(3) 100ms;
        }

        .overlay-exit {
            background-color: rgba(0, 0, 0, 0);
        }

        .menu-head {
            text-align: center;
            display: flex;
            justify-content: center;
            padding: 6px 0 8px 0;
            border-bottom: 6px solid var(--rps-border);
            background-color: #FBB762;
        }

        .menu-head h1 {
            color: #2F2F2F;
            font-weight: normal;
        }

        .pick-hand-container {
            position: relative;
            background-color: #E6E2BD;
            width: fit-content;
            display: flex;
            flex-direction: column;
            transform: translateX(0) translateY(0);
            opacity: 1;
            transition: transform 280ms steps(7), opacity 280ms steps(7);
            border: 6px solid var(--rps-border);
            border-radius: var(--rps-border-radius);
            overflow: hidden;
            box-shadow: 0 0 0 1px #2B2B2B inset, 2px 2px 0 rgba(0, 0, 0, 0.25);
        }

        .menu-exit {
            transform: translateX(6px) translateY(-50%);
            opacity: 0;
            pointer-events: none;
        }

        .pick-hand-content {
            display: grid;
            padding: 36px;
            gap: 32px;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            place-items: center;
            align-items: flex-end;
            grid-template-areas: "rock rock" "scissor paper";
        }

        #pick-rock {
            grid-area: rock;
        }

        #pick-paper {
            grid-area: paper;
        }

        #pick-scissor {
            grid-area: scissor;
        }

        .pick-hand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            width: max-content;
        }

        .pick-hand img {
            width: 85px;
        }

        .pick-hand p {
            font-size: 1.3rem;
            color: #7D4400;
            font-weight: bold;
        }

        #rps-main {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .player-container,
        .cpu-container {
            background-color: transparent;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            justify-content: flex-start;
            gap: 20px;
        }

        .player-container h1,
        .cpu-container h1 {
            color: white;
            text-shadow: 3px 3px 0 #000;
            font-size: 2.5rem;
            font-weight: normal;
            margin-top: 5vh;
        }

        .hearts {
            display: flex;
            gap: 5px;
            margin-bottom: 5vh;
        }

        .hand-wrap {
            display: grid;
            place-items: center;
            height: 200px;
            margin-top: auto;
            margin-bottom: 25vh;
        }

        .new-game-overlay {
            background-color: rgba(0, 0, 0, 0.1);
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hide-new-game-menu {
            display: none;
        }

        .new-game-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #E6E2BD;
            padding: 20px;
            border-radius: var(--rps-border-radius);
            border: 6px solid var(--rps-border);
            box-shadow: 0 0 0 1px #2B2B2B inset, 2px 2px 0 rgba(0, 0, 0, 0.25);
            gap: 15px;
        }

        #new-game-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 240px;
            background: #FBB762;
            color: #3A2A1A;
            font-family: inherit;
            font-size: 1.1rem;
            padding: 15px 18px;
            border-radius: 4px;
            box-shadow: 0 0 0 2px #2B1B0E inset, 2px 2px 0 rgba(0, 0, 0, 0.25);
            border: none;
            cursor: pointer;
            transition: transform 60ms steps(1), box-shadow 60ms steps(1);
            text-align: center;
        }

        #new-game-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 0 0 0 2px #2B1B0E inset, 3px 3px 0 rgba(0, 0, 0, 0.25);
        }

        #new-game-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 0 0 0 2px #2B1B0E inset, 1px 1px 0 rgba(0, 0, 0, 0.25);
        }

        /* RPS ANIMATIONS */
        @keyframes pixelFloat {
            0% {
                transform: translate(0px, 0px);
            }

            25% {
                transform: translate(0px, -3px);
            }

            50% {
                transform: translate(3px, -4px);
            }

            75% {
                transform: translate(0px, -3px);
            }

            100% {
                transform: translate(0px, 0px);
            }
        }

        #pick-rock:hover img,
        #pick-paper:hover img,
        #pick-scissor:hover img {
            animation: pixelFloat 0.6s steps(1) infinite;
        }

        .player-hand {
            height: 160px;
            display: inline-block;
            animation: pixelFloat 0.7s steps(1) infinite;
        }

        .cpu-hand {
            height: 160px;
            display: inline-block;
            animation: pixelFloat 0.7s steps(1) infinite reverse;
            animation-delay: 0.1s;
        }

        .shake {
            animation: throw 700ms steps(1) 1;
        }

        .hand-damage {
            animation: sideDamage 420ms steps(1) 1;
        }

        .heart-damage {
            animation: heartDamage 1.5s steps(1) 1 forwards;
        }

        @keyframes throw {
            0% {
                transform: translate(0px, 0px);
            }

            16% {
                transform: translate(0px, 13px);
            }

            33% {
                transform: translate(0px, 0px);
            }

            50% {
                transform: translate(0px, 13px);
            }

            66% {
                transform: translate(0px, 0px);
            }

            83% {
                transform: translate(0px, 15px);
            }

            100% {
                transform: translate(0px, 0px);
            }
        }

        @keyframes sideDamage {
            0% {
                filter: none;
                transform: translate(0px, 0px);
            }

            8% {
                filter: brightness(1.35) contrast(1.2);
            }

            16% {
                filter: none;
            }

            24% {
                filter: brightness(1.35) contrast(1.2);
            }

            32% {
                filter: none;
            }

            40% {
                transform: translate(-3px, 2px);
            }

            50% {
                transform: translate(3px, -2px);
            }

            60% {
                transform: translate(-3px, -1px);
            }

            70% {
                transform: translate(3px, 1px);
            }

            80% {
                transform: translate(-2px, 2px);
            }

            90% {
                transform: translate(2px, -2px);
            }

            100% {
                filter: none;
                transform: translate(0px, 0px);
            }
        }

        @keyframes heartDamage {
            0% {
                opacity: 1;
                transform: translate(0px, 0px);
            }

            8% {
                opacity: 0;
            }

            16% {
                opacity: 1;
            }

            25% {
                transform: translate(-2px, 1px);
            }

            32% {
                transform: translate(3px, -1px);
            }

            38% {
                transform: translate(-3px, 2px);
            }

            44% {
                transform: translate(2px, -2px);
            }

            50% {
                transform: translate(-2px, 0px);
            }

            56% {
                transform: translate(3px, 1px);
            }

            62% {
                transform: translate(-3px, -1px);
            }

            68% {
                transform: translate(2px, 2px);
            }

            80% {
                transform: translate(0px, 10px);
                opacity: 1;
            }

            100% {
                transform: translate(0px, 0px);
                opacity: 0;
            }
        }

        /* ACTIVE HERO DISPLAY */
        #active-hero-display {
            text-align: center;
            color: #fff !important;
            margin-bottom: 20px !important;
            font-size: 2rem !important;
            text-shadow: 0 0 10px var(--pixel-gold), 0 0 20px var(--pixel-gold), 2px 2px 0 #000 !important;
            animation: glowPulse 1.5s infinite alternate;
        }

        @keyframes glowPulse {
            0% {
                filter: drop-shadow(0 0 5px var(--pixel-gold));
                transform: scale(1);
            }

            100% {
                filter: drop-shadow(0 0 15px var(--pixel-gold));
                transform: scale(1.05);
            }
        }

        .blinking-text {
            animation: blinkText 1s infinite;
            color: var(--pixel-gold);
        }

        @keyframes blinkText {

            0%,
            49% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }

        /* KEYBOARD NAVIGATION HIGHLIGHTS */
        .menu-item:focus {
            transform: scale(1.05);
            filter: brightness(1.3) drop-shadow(0 0 8px var(--pixel-gold));
            outline: 2px solid var(--pixel-gold);
            color: var(--pixel-gold);
        }

        .btn-start:focus {
            transform: translate(-1px, -1px);
            box-shadow: 0 0 0 2px #2B1B0E inset, 3px 3px 0 rgba(0, 0, 0, 0.25);
            outline: none;
        }

        .cc:focus {
            transform: translateY(-5px);
            outline: 4px solid var(--pixel-gold);
        }

        .pick-hand:focus {
            transform: translateY(-5px);
            outline: none;
            filter: brightness(1.2) drop-shadow(0px 0px 10px var(--pixel-gold));
        }

        .pause-menu-item:focus {
            background: #8ce99a;
            transform: translateY(-2px);
            outline: none;
            color: #2C3A47;
        }

        .cancel-target:focus,
        .cancel-target.focused-target {
            color: var(--pixel-gold);
            text-shadow: 2px 2px 0 #000, 0 0 8px rgba(255, 215, 0, 0.6);
            outline: none;
            border-color: var(--pixel-gold);
        }

        .close-x:focus {
            filter: brightness(1.5);
            outline: none;
        }

        #new-game-btn:focus {
            transform: translate(-1px, -1px);
            box-shadow: 0 0 0 2px #2B1B0E inset, 3px 3px 0 rgba(0, 0, 0, 0.25);
            outline: none;
        }

        .info-icon-btn:focus {
            transform: scale(1.2);
            background: var(--pixel-gold);
            outline: 2px solid #fff;
        }
    </style>
</head>

<body>

    <div id="transition-overlay" class="iris-overlay hidden"></div>
    <canvas id="transition-canvas"
        style="position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:9999;"></canvas>
    <div id="pause-btn" class="hidden" onclick="togglePause()"></div>

    <!-- SCREEN 1: HOME MENU -->
    <div id="menuScreen" class="screen active">
        <div id="menu-scene-container">
            <div id="layer-sky" class="parallax-layer"></div>
            <div id="layer-grass" class="parallax-layer"></div>
            <div id="layer-tree" class="parallax-layer"></div>
            <div id="layer-flowers" class="parallax-layer"></div>
            <div id="menu-cat"></div>
        </div>
        <div class="vignette"></div>
        <div class="title-container">
            <div class="game-title">AXIOM CLASH</div>
        </div>
        <div class="press-start-wrap">
            <div class="press-start-text"><span>&lt;</span> PRESS START <span>&gt;</span></div>
        </div>

        <div class="social-links-container">
            <!-- Website Link Icon -->
            <a href="https://github.com/elijhpadln/PADLAN-ALIDIO.git" target="_blank" class="weblink-icon" id="weblink-btn-1" tabindex="0">
                <img src="assets/icon.gif" alt="Website" style="width:100%; height:100%; image-rendering:pixelated;" onerror="this.src='assets/cursor.png'">
            </a>
        </div>
    </div>

    <!-- SCREEN 2: TEAM SELECT -->
    <div id="teamScreen" class="screen">
        <div class="inner">
            <div class="screen-title">ASSEMBLE YOUR PARTY</div>
            <div class="screen-subtitle">SELECT 3 HEROES</div>
            <div class="creature-grid" id="creatureGrid"></div>
            <div class="team-preview">
                <div class="tp-label">YOUR PARTY</div>
                <div class="team-slot" id="slot0">?</div>
                <div class="team-slot" id="slot1">?</div>
                <div class="team-slot" id="slot2">?</div>
                <button class="btn-start" id="confirmBtn" onclick="confirmTeam()" disabled>BATTLE!</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 2.5: ROCK PAPER SCISSORS GAMBLE -->
    <div id="rpsScreen" class="screen">
        <div class="pick-hand-menu">
            <div class="pick-hand-container">
                <div class="menu-head" style="flex-direction: column; align-items: center; padding: 15px;">
                    <h1>INITIATIVE GAMBLE</h1>
                    <p
                        style="font-size: 0.75rem; color: #555; margin-top: 5px; font-family: 'Rajdhani', sans-serif; font-weight: bold;">
                        Win to strike first!</p>
                </div>
                <div class="pick-hand-content">
                    <div id="pick-rock" class="pick-hand" data-hand="rock" tabindex="0"><img
                            src="assets/pick-rock-hand.png" alt="">
                        <p>ROCK</p>
                    </div>
                    <div id="pick-paper" class="pick-hand" data-hand="paper" tabindex="0"><img
                            src="assets/pick-paper-hand.png" alt="">
                        <p>PAPER</p>
                    </div>
                    <div id="pick-scissor" class="pick-hand" data-hand="scissor" tabindex="0"><img
                            src="assets/pick-scissor-hand.png" alt="">
                        <p>SCISSOR</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="new-game-overlay hide-new-game-menu">
            <div class="new-game-content" style="text-align: center;">
                <h1 id="rpsWinStatus" style="font-size: 2.5rem; margin-bottom: 10px;">WINNER</h1>
                <p id="rpsBonusDesc" style="color:#7D4400; margin-bottom: 30px; font-size: 1.2rem;">Your party attacks

        function playBGM(name) {
            if (!name || !BGM[name]) return;
            if (bgmNameActive === name && currentBGM && !currentBGM.paused) return;
            
            bgmNameActive = name;
            
            // Stop any existing fade intervals
            if (window.bgmFadeInterval) clearInterval(window.bgmFadeInterval);
            if (window.bgmInInterval) clearInterval(window.bgmInInterval);

            const startNewBGM = () => {
                if (currentBGM) {
                    currentBGM.pause();
                    currentBGM.currentTime = 0;
                }
                currentBGM = BGM[name];
                currentBGM.volume = 0.5; // Direct set to avoid fade-in issues for now
                currentBGM.currentTime = 0;
                currentBGM.play().catch(e => console.log('BGM blocked:', e));
            };

            if (currentBGM && currentBGM.volume > 0) {
                let vol = currentBGM.volume;
                window.bgmFadeInterval = setInterval(() => {
                    vol -= 0.1;
                    if (vol <= 0) {
                        clearInterval(window.bgmFadeInterval);
                        startNewBGM();
                    } else {
                        currentBGM.volume = vol;
                    }
                }, 50);
            } else {
                startNewBGM();
            }

        function pausableTimeout(cb, delay) {
            let start = Date.now();
            let remaining = delay;
            let timerId;
            let pt = {
                pause: () => { clearTimeout(timerId); remaining -= (Date.now() - start); },
                resume: () => { start = Date.now(); clearTimeout(timerId); if (remaining <= 0) remaining = 0; timerId = setTimeout(() => { cb(); G.activeTimers.delete(pt); }, remaining); },
                clear: () => { clearTimeout(timerId); G.activeTimers.delete(pt); }
            };
            G.activeTimers.add(pt);
            if (!G.isPaused) { pt.resume(); }
            return pt;
        }

        const tryStartBGM = () => {
            if (!hasInteracted) {
                hasInteracted = true;
                if (currentBGM && currentBGM.paused) {
                    currentBGM.play().catch(e => console.log('BGM blocked:', e));
                } else if (!currentBGM && bgmNameActive) {
                    playBGM(bgmNameActive);

            for (let char in ANIMATION_ASSETS) { for (let anim in ANIMATION_ASSETS[char]) imagesToLoad++; }

                for (let anim in ANIMATION_ASSETS[char]) {
                    const img = new Image();
                    img.src = ANIMATION_ASSETS[char][anim].src;
                    img.onload = () => { imagesLoaded++; if (imagesLoaded === imagesToLoad) finishLoading(); };

                    LOADED_IMAGES[`${char}_${anim}`] = img;

            const newStartText = startText.cloneNode(true);
            startText.parentNode.replaceChild(newStartText, startText);

            newStartText.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                initGameAudio();
            };

            // Ensure the menuScreen itself DOES NOT start the game
            const menuScreen = document.getElementById('menuScreen');
            menuScreen.onclick = null;
            menuScreen.removeEventListener('click', startGame);

            requestAnimationFrame(gameLoop);
        }

        function gameLoop(timestamp) {
            requestAnimationFrame(gameLoop);
            if (G.isPaused) return;

            const menuScreen = document.getElementById('menuScreen');
            const teamScreen = document.getElementById('teamScreen');
            const isMenu = (menuScreen && menuScreen.classList.contains('active')) || (teamScreen && teamScreen.classList.contains('active'));

            const tickThreshold = isMenu ? 14 : 9;

            if (isMenu && menuScreen && menuScreen.classList.contains('active')) {
                const skyLayer = document.getElementById('layer-sky');
                const flowerLayer = document.getElementById('layer-flowers');
                if (skyLayer && flowerLayer) {
                    const elapsed = timestamp || performance.now();
                    skyLayer.style.transform = `scale(1.05) translateX(${Math.sin(elapsed * 0.0002) * 3}%)`;
                    flowerLayer.style.transform = `translate(${Math.sin(elapsed * 0.0015) * 2}px, ${Math.cos(elapsed * 0.002) * 1.5}px)`;
                }
            }

            globalFrameCount++;
            if (globalFrameCount >= tickThreshold) {
                globalFrameCount = 0;
                animTick++;
            }

            const allEnts = (G.p && G.c) ? [...G.p.team, ...G.c.team] : [];
            allEnts.forEach(ent => {
                drawModularSprite(`sprite_${ent.uid}`, ent.key, ent.action, !ent.isPlayer, false, ent);
            });

            CHARACTERS.forEach(h => drawModularSprite(`select_sprite_${h.id}`, h.key, 'idle', false, true));

            for (let i = 0; i < 3; i++) {
                if (G.selectedTeam[i] !== undefined) {
                    const charObj = CHARACTERS.find(c => c.id === G.selectedTeam[i]);
                    if (charObj) drawModularSprite(`preview_sprite_${i}`, charObj.key, 'idle', false, true);
                }
            }

            if (!document.getElementById('infoModal').classList.contains('hidden')) {
                const modalEnts = (G.p && G.c) ? [...G.p.team, ...G.c.team] : [];
                modalEnts.forEach(c => {
                    if (document.getElementById(`info_icon_${c.uid}`)) {
                        drawModularSprite(`info_icon_${c.uid}`, c.key, 'idle', !c.isPlayer, true, c);
                    }
                });
            }
        }

        function drawModularSprite(canvasId, charKey, action, flipX, isUI = false, ent = null) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let usingIdle2 = false;
            if (action === 'idle' && LOADED_IMAGES[`${charKey}_idle2`]) {
                if (ent && ent.idleSwapTime === undefined) {
                    ent.idleSwapTime = animTick + 40 + Math.floor(Math.random() * 60);
                    ent.playingIdle2 = false;
                }

                if (ent && !ent.playingIdle2 && animTick >= ent.idleSwapTime) {
                    ent.playingIdle2 = true;
                    ent.idle2StartTick = animTick;
                }

                if (ent && ent.playingIdle2) {
                    const tempImg = LOADED_IMAGES[`${charKey}_idle2`];
                    if (tempImg && tempImg.complete && tempImg.naturalWidth > 0) {
                        const tempFrames = Math.max(1, Math.floor(tempImg.naturalWidth / tempImg.naturalHeight));
                        let ticksPassed = animTick - ent.idle2StartTick;
                        let frameCalc = Math.floor(ticksPassed / 2.5);

                        if (frameCalc >= tempFrames) {
                            ent.playingIdle2 = false;
                            ent.idleSwapTime = animTick + 40 + Math.floor(Math.random() * 60);
                        } else {
                            usingIdle2 = true;
                            action = 'idle2';
                        }
                    }
                }
            }

            const imgKey = `${charKey}_${action}`;
            const img = LOADED_IMAGES[imgKey];

            if (!img || !img.complete || img.naturalWidth === 0) return;

            const totalFrames = Math.max(1, Math.floor(img.naturalWidth / img.naturalHeight));
            const frameWidth = Math.floor(img.naturalWidth / totalFrames);
            const frameHeight = img.naturalHeight;

            let currentFrame = 0;
            const isAttack = ['attack1', 'attack2', 'attack3', 'attack4', 'shot', 'shot1', 'shot2', 'charge', 'flame', 'explosion', 'poison', 'cloud_poison', 'special_attack', 'jump'].includes(action);

            if (usingIdle2 && ent) {
                let ticksPassed = animTick - ent.idle2StartTick;
                currentFrame = Math.floor(ticksPassed / 2.5);
            }
            else if (isAttack) {
                if (ent && ent.action !== ent.lastAction) {
                    ent.actionStartTick = animTick;
                }
                let ticksPassed = animTick - (ent ? (ent.actionStartTick || animTick) : animTick);
                currentFrame = Math.min(ticksPassed, totalFrames - 1);
            }
            else if (action === 'die' || action === 'dead') {
                if (ent && ent.dieTick !== undefined) {
                    let ticksPassed = animTick - ent.dieTick;
                    currentFrame = Math.min(Math.floor(ticksPassed / 1.5), totalFrames - 1);
                } else {
                    currentFrame = totalFrames - 1;
                }
            }
            else {
                if (charKey === 'enchantress' && action === 'idle') {
                    currentFrame = totalFrames === 1 ? 0 : (Math.floor(animTick / 1.5) % totalFrames);
                } else {
                    currentFrame = totalFrames === 1 ? 0 : (animTick % totalFrames);
                }
            }

            if (ent) ent.lastAction = action;

            const sourceX = currentFrame * frameWidth;
            const clipW = frameWidth;
            ctx.save();

            if (isUI) {
                if (flipX) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
                let scale = Math.min(canvas.width / frameWidth, canvas.height / frameHeight);

                let dy;
                if (canvasId.includes('select_sprite') || canvasId.includes('preview_sprite')) {
                    const bottomPadding = (canvasId.includes('select_sprite')) ? 25 : 20;
                    const safeDrawHeight = canvas.height - bottomPadding;
                    scale = safeDrawHeight / frameHeight;
                    dy = canvas.height - (frameHeight * scale) - bottomPadding;
                } else if (canvasId.includes('info_icon')) {
                    scale *= 1.25;
                    dy = (canvas.height - (frameHeight * scale)) / 2;
                } else {
                    dy = (canvas.height - (frameHeight * scale)) / 2;
                }

                const dw = clipW * scale;
                const dh = frameHeight * scale;
                const dx = (canvas.width - dw) / 2;

                ctx.drawImage(img, sourceX, 0, clipW, frameHeight, dx, dy, dw, dh);
            } else {
                let scale = 1.8;
                if (clipW * scale > canvas.width) scale = canvas.width / clipW;
                if (frameHeight * scale > canvas.height) scale = canvas.height / frameHeight;
                const dw = clipW * scale;
                const dh = frameHeight * scale;
                const dx = (canvas.width - dw) / 2;
                const dy = canvas.height - dh;

                if (flipX) {
                    ctx.translate(canvas.width / 2, 0);
                    ctx.scale(-1, 1);
                    ctx.translate(-canvas.width / 2, 0);
                }
                ctx.drawImage(img, sourceX, 0, clipW, frameHeight, dx, dy, dw, dh);
            }
            ctx.restore();
        }

        function transitionClose(callback) {
            const canvas = document.getElementById('transition-canvas');
            if (!canvas) { if (callback) callback(); return; }
            const ctx = canvas.getContext('2d');
            const size = 60;
            let p = 0;
            function draw() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'black';
                for (let x = 0; x < canvas.width; x += size) {
                    for (let y = 0; y < canvas.height; y += size) {
                        const ux = x / canvas.width;
                        const uy = 1.0 - (y / canvas.height);
                        const progressValue = (p * 4) - (ux + uy);
                        const scale = Math.max(0, Math.min(1.0, progressValue));
                        if (scale > 0) {
                            const cx = x + size / 2;
                            const cy = y + size / 2;
                            const r = scale * size;
                            ctx.beginPath();
                            ctx.moveTo(cx, cy - r);
                            ctx.lineTo(cx + r, cy);
                            ctx.lineTo(cx, cy + r);
                            ctx.lineTo(cx - r, cy);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                }
                p += 0.025;
                if (p <= 1.3) {
                    requestAnimationFrame(draw);
                } else {
                    if (callback) callback();
                }
            }
            draw();
        }

        function transitionOpen(callback) {
            const canvas = document.getElementById('transition-canvas');
            if (!canvas) { if (callback) callback(); return; }
            const ctx = canvas.getContext('2d');
            const size = 60;
            let p = 0;
            function draw() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'black';

                for (let x = 0; x < canvas.width; x += size) {
                    for (let y = 0; y < canvas.height; y += size) {
                        const ux = x / canvas.width;
                        const uy = 1.0 - (y / canvas.height);
                        const progressValue = (p * 4) - ((1.0 - ux) + (1.0 - uy));
                        const scale = Math.max(0, Math.min(1.0, progressValue));
                        if (scale > 0) {
                            const cx = x + size / 2;
                            const cy = y + size / 2;
                            const r = scale * size;
                            ctx.beginPath();
                            ctx.moveTo(cx, cy - r);
                            ctx.lineTo(cx + r, cy);
                            ctx.lineTo(cx, cy + r);
                            ctx.lineTo(cx - r, cy);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                }
                ctx.globalCompositeOperation = 'source-over';
                p += 0.025;
                if (p <= 1.3) {
                    requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (callback) callback();
                }
            }
            draw();
        }

        function waitTransition(element, timeout = 1000) {
            return new Promise(resolve => {
                let isResolved = false;
                const timer = setTimeout(() => {
                    if (!isResolved) { isResolved = true; element.removeEventListener("transitionend", handler); resolve(); }
                }, timeout);
                function handler(e) {
                    if (e.target === element && !isResolved) {
                        isResolved = true; clearTimeout(timer); element.removeEventListener("transitionend", handler); resolve();
                    }
                }
                element.addEventListener("transitionend", handler);
            });
        }

        function waitAnimation(element, timeout = 2000) {
            return new Promise(resolve => {
                let isResolved = false;
                const timer = setTimeout(() => {
                    if (!isResolved) { isResolved = true; element.removeEventListener("animationend", handler); resolve(); }
                }, timeout);
                function handler(e) {
                    if (e.target === element && !isResolved) {
                        isResolved = true; clearTimeout(timer); element.removeEventListener("animationend", handler); resolve();
                    }
                }
                element.addEventListener("animationend", handler);
            });
        }

        async function onPick(e) {
            if (rpsIsLocked) return;
            rpsIsLocked = true;
            let playerHand = e.currentTarget.dataset.hand;
            let cpuHand = pickCpuHand();
            await exitMenu();
            await revealHand(playerHand, cpuHand);
            let roundWinner = determineRoundWinner(playerHand, cpuHand);

            if (roundWinner === 'draw') {
                setTimeout(async () => { await openMenu(); rpsIsLocked = false; }, 1000);
            } else {
                playSFX('hurt');
                if (roundWinner === 'player') {
                    const hearts = document.querySelectorAll(".cpu-container .hearts img");
                    if (hearts.length > 0) {
                        let heart = hearts[hearts.length - 1];
                        cpuHandImg.classList.add("hand-damage");
                        heart.classList.add("heart-damage");
                        await waitAnimation(heart, 2000);
                        heart.remove();
                    } else {
                        cpuHandImg.classList.add("hand-damage"); await waitAnimation(cpuHandImg);
                    }
                    cpuHandImg.classList.remove("hand-damage");
                } else {
                    const hearts = document.querySelectorAll(".player-container .hearts img");
                    if (hearts.length > 0) {
                        let heart = hearts[hearts.length - 1];
                        playerHandImg.classList.add("hand-damage");
                        heart.classList.add("heart-damage");
                        await waitAnimation(heart, 2000);
                        heart.remove();
                    } else {
                        playerHandImg.classList.add("hand-damage"); await waitAnimation(playerHandImg);
                    }
                    playerHandImg.classList.remove("hand-damage");
                }
                setTimeout(() => { endRPSGame(roundWinner); }, 500);
            }
        }

        async function exitMenu() { pickHandMenu.classList.add("menu-exit"); await waitTransition(pickHandMenu); rpsOverlay.classList.add("overlay-exit"); await waitTransition(rpsOverlay); }
        async function openMenu() { pickHandMenu.classList.remove("menu-exit"); rpsOverlay.classList.remove("overlay-exit"); }

        async function shakeAnimation() {
            return new Promise(resolve => {
                setTimeout(() => { cpuHandImg.classList.add("shake"); }, 500);
                setTimeout(() => { playerHandImg.classList.add("shake"); }, 500);

                setTimeout(async () => {
                    await waitAnimation(playerHandImg, 1000);
                    cpuHandImg.classList.remove("shake");
                    playerHandImg.classList.remove("shake");
                    resolve();
                }, 500);
            });
        }

        async function revealHand(playerHand, cpuHand) {
            await shakeAnimation();
            return new Promise(resolve => {
                const playerOriginalImage = playerHandImg.src;
                const cpuOriginalImage = cpuHandImg.src;
                playerHandImg.src = `assets/player-${playerHand}.png`;
                cpuHandImg.src = `assets/cpu-${cpuHand}.png`;
                setTimeout(() => { playerHandImg.src = playerOriginalImage; cpuHandImg.src = cpuOriginalImage; resolve(); }, 1500);
            });
        }
        const determineRoundWinner = (playerHand, cpuHand) => {
            if (playerHand === "rock") playerHand = 1; else if (playerHand === "paper") playerHand = 2; else if (playerHand === "scissor") playerHand = 3;
            if (cpuHand === "rock") cpuHand = 1; else if (cpuHand === "paper") cpuHand = 2; else if (cpuHand === "scissor") cpuHand = 3;
            const result = ((playerHand - cpuHand + 3) % 3);
            if (result === 1) return "player"; else if (result === 2) return "cpu"; else return "draw";
        }
        const pickCpuHand = () => { const cpuHand = Math.floor((Math.random() * 3) + 1); if (cpuHand === 1) return "rock"; else if (cpuHand === 2) return "paper"; else return "scissor"; }

        function endRPSGame(winner) {
            let winStatus = document.getElementById("rpsWinStatus");
            let bonus = 'none';
            if (winner === "cpu") {
                winStatus.textContent = "AMBUSHED!";
                winStatus.style.color = "#ff5252";
                document.getElementById("rpsBonusDesc").textContent = "The enemy strikes first!";
                bonus = 'enemy';
                playSFX('lose');
            } else {
                winStatus.textContent = "PREEMPTIVE STRIKE!";
                winStatus.style.color = "#2ecc71";
                document.getElementById("rpsBonusDesc").textContent = "Your party attacks first!";
                bonus = 'player';
                playSFX('victoryRps');
            }
            newGameMenu.classList.remove("hide-new-game-menu");
            const nextBtn = document.getElementById("new-game-btn");
            nextBtn.onclick = (e) => {
                e.preventDefault();
                playBGM('battle');
                const enemyRoster = CHARACTERS.filter(c => c.isEnemy);
                const cpuIds = []; for (let i = 0; i < 3; i++) { const randomMonster = enemyRoster[Math.floor(Math.random() * enemyRoster.length)]; cpuIds.push(randomMonster.id); }
                const overlay = document.getElementById('transition-overlay');
                overlay.classList.remove('hidden', 'iris-opening');
                overlay.classList.add('iris-closing'); // Iris out to black screen
                setTimeout(() => {
                    initBattle(G.selectedTeam, cpuIds, bonus);
                    showScreen('battle');
                    document.getElementById('pause-btn').classList.remove('hidden');
                    overlay.classList.remove('iris-closing');
                    overlay.classList.add('iris-opening'); // Iris in revealing the battlefield
                    setTimeout(() => { overlay.classList.add('hidden'); }, 800);
                }, 800);
            };
        }

        // ===============================================
        // BATTLE ENGINE
        // ===============================================
        function initBattle(pIds, cIds, bonus = 'none') {
            G.lastBattleParams = { pIds, cIds, bonus };
            const mkP = ids => ids.map(id => { const b = CHARACTERS.find(h => h.id === id); const startCT = bonus === 'player' ? 1000 : (bonus === 'enemy' ? 0 : Math.random() * 200); return { ...b, uid: 'u' + (uidCounter++), currentHp: b.maxHp, mp: b.maxMp, isPlayer: true, action: 'idle', ct: startCT }; });
            const mkC = ids => ids.map(id => { const b = CHARACTERS.find(m => m.id === id); const startCT = bonus === 'enemy' ? 1000 : (bonus === 'player' ? 0 : Math.random() * 200); return { ...b, name: `Enemy ${b.name}`, uid: 'u' + (uidCounter++), currentHp: b.maxHp, mp: b.maxMp, isPlayer: false, action: 'idle', ct: startCT }; });
            G.p = { team: mkP(pIds) };
            G.c = { team: mkC(cIds) };
            G.turnQueue = [];
            renderEntities();
            renderHUD();
            pausableTimeout(advanceTurn, 100);
        }

            updateBars();
        }

        function advanceTurn() {
            if (checkGameOver()) return;
            let alive = [...G.p.team, ...G.c.team].filter(e => e.currentHp > 0);
            if (alive.length === 0) return;
            let minTime = Infinity, nextUnit = null;
            for (let e of alive) { let timeNeeded = (1000 - e.ct) / e.spd; if (timeNeeded < minTime) { minTime = timeNeeded; nextUnit = e; } }
            alive.forEach(e => { e.ct += e.spd * minTime; });
            G.activeEnt = nextUnit;
            G.activeEnt.ct = 0;

            G.activeEnt.immunity = false;
            G.activeEnt.mp = Math.min(G.activeEnt.maxMp, G.activeEnt.mp + 20);
            updateBars();

            document.querySelectorAll('.entity-wrap').forEach(e => e.classList.remove('is-active'));
            document.getElementById(`wrap_${G.activeEnt.uid}`).classList.add('is-active');

            const commandPanel = document.getElementById('command-panel');
            const heroDisplay = document.getElementById('active-hero-display');

            // Update the selector to show whose turn it is
            if (heroDisplay) {
                if (G.activeEnt.isPlayer) {
                    heroDisplay.innerText = `${G.activeEnt.name.toUpperCase()}'S TURN`;
                    heroDisplay.style.visibility = 'visible';
                    heroDisplay.classList.add('blinking-text');
                } else {
                    heroDisplay.innerText = ""; // Hide name when it's enemy turn
                    heroDisplay.style.visibility = 'hidden';
                    heroDisplay.classList.remove('blinking-text');
                }
            }

            commandPanel.classList.remove('hidden');
            if (G.activeEnt.isPlayer) {
                commandPanel.classList.add('active-turn');
                showMainMenu();
            } else {
                commandPanel.classList.remove('active-turn');
                pausableTimeout(cpuTurn, 1000);
            }
        }

        function cpuTurn() {
            const validMoves = G.activeEnt.moves.filter(m => m.mpCost <= G.activeEnt.mp);
            let move = { name: 'Strike', power: G.activeEnt.atk, mpCost: 0, anim: 'attack1' };
            if (validMoves.length > 0 && Math.random() > 0.5) { move = validMoves[Math.floor(Math.random() * validMoves.length)]; }
            let targets = move.isHeal ? G.c.team.filter(c => c.currentHp > 0) : G.p.team.filter(c => c.currentHp > 0);
            if (targets.length === 0) { pausableTimeout(advanceTurn, 200); return; }
            const target = targets[Math.floor(Math.random() * targets.length)];
            executeMove(G.activeEnt, target, move);
        }

        let logTimeout;
        function updateBattleLog(message, duration = 4000) {
            const logEl = document.getElementById('battle-log');
            if (!logEl) return;

            clearTimeout(logTimeout);

            logEl.innerHTML = message;
            logEl.style.opacity = 1;

            logTimeout = pausableTimeout(() => {
                logEl.style.opacity = 0;
            }, duration);
