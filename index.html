<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Clash - RPG Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="transition-overlay" class="iris-overlay hidden"></div>
<div id="pause-btn" class="hidden" onclick="togglePause()"></div>

<!-- SCREEN 1: HOME MENU -->
<div id="menuScreen" class="screen active">
    <div id="menu-scene-container">
        <div id="layer-sky" class="parallax-layer"></div>      
        <div id="layer-grass" class="parallax-layer"></div>    
        <div id="layer-tree" class="parallax-layer"></div>     
        <div id="layer-flowers" class="parallax-layer"></div>
        <div id="menu-cat"></div>
    </div>
    <div class="vignette"></div>
    <div class="title-container"><div class="game-title">AXIOM CLASH</div></div>
    <div class="press-start-wrap"><div class="press-start-text"><span>&lt;</span> PRESS START <span>&gt;</span></div></div>
</div>

<!-- SCREEN 2: TEAM SELECT -->
<div id="teamScreen" class="screen">
    <div class="inner">
        <div class="screen-title">ASSEMBLE YOUR PARTY</div>
        <div class="screen-subtitle">SELECT 3 HEROES</div>
        <div class="creature-grid" id="creatureGrid"></div>
        <div class="team-preview">
            <div class="tp-label">YOUR PARTY</div>
            <div class="team-slot" id="slot0">?</div>
            <div class="team-slot" id="slot1">?</div>
            <div class="team-slot" id="slot2">?</div>
            <button class="btn-start" id="confirmBtn" onclick="confirmTeam()" disabled>BATTLE! →</button>
        </div>
    </div>
</div>

<!-- SCREEN 2.5: ROCK PAPER SCISSORS GAMBLE -->
<div id="rpsScreen" class="screen">
    <div class="pick-hand-menu">
        <div class="pick-hand-container">
            <div class="menu-head" style="flex-direction: column; align-items: center; padding: 15px;">
                <h1>INITIATIVE GAMBLE</h1>
                <p style="font-size: 0.75rem; color: #555; margin-top: 5px; font-family: 'Rajdhani', sans-serif; font-weight: bold;">Win to strike first!</p>
            </div>
            <div class="pick-hand-content">
                <div id="pick-rock" class="pick-hand" data-hand="rock"><img src="assets/pick-rock-hand.png" alt=""><p>ROCK</p></div>
                <div id="pick-paper" class="pick-hand" data-hand="paper"><img src="assets/pick-paper-hand.png" alt=""><p>PAPER</p></div>
                <div id="pick-scissor" class="pick-hand" data-hand="scissor"><img src="assets/pick-scissor-hand.png" alt=""><p>SCISSOR</p></div>
            </div>
        </div>
    </div>
    <div class="new-game-overlay hide-new-game-menu">
        <div class="new-game-content" style="text-align: center;">
            <h1 id="rpsWinStatus" style="font-size: 2.5rem; margin-bottom: 10px;">WINNER</h1>
            <p id="rpsBonusDesc" style="color:#7D4400; margin-bottom: 30px; font-size: 1.2rem;">Your party attacks first!</p>
            <button id="new-game-btn">START BATTLE! <span>></span></button>
        </div>
    </div>
    <div id="rps-main">
        <div class="player-container">
            <h1>PLAYER</h1>
            <div class="hearts"><img src="assets/life-heart.svg" width="40" alt="heart"></div>
            <div class="hand-wrap"><img class="player-hand" src="assets/player-rock.png" alt=""></div>
        </div>
        <div class="cpu-container">
            <h1>CPU</h1>
            <div class="hearts"><img src="assets/life-heart.svg" width="40" alt="heart"></div>
            <div class="hand-wrap"><img class="cpu-hand" src="assets/cpu-rock.png" alt=""></div>
        </div>
    </div>
</div>

<!-- SCREEN 3: BATTLE -->
<div id="battleScreen" class="screen">
    <div class="stage" id="stage">
        
        <div id="top-hud">
            <div id="ally-hud" class="side-hud left-hud"></div>
            <div class="vs-text">VS</div>
            <div id="enemy-hud" class="side-hud right-hud"></div>
        </div>

        <div id="targetMenuOverlay" class="hidden">
            <div class="target-msg">SELECT TARGET</div>
            <div class="cancel-target" onclick="cancelTargeting()">[ CANCEL ]</div>
        </div>
        <div id="entitiesLayer"></div>
    </div>

    <div id="bottom-hud">
        <div id="command-panel" class="jrpg-window">
            <div id="mainMenuBox" class="menu-list">
                <button class="menu-item" onclick="handleStrike()">Strike</button>
                <button class="menu-item" id="skill-btn" onclick="showSkillsMenu()">Skills</button>
                <button class="menu-item" onclick="showInfoModal()">Info</button>
            </div>
            <div id="skillsMenuBox" class="menu-list hidden">
                <div id="skillsList"></div>
                <button class="menu-item" onclick="showMainMenu()">Back</button>
            </div>
        </div>
    </div>
</div>

<!-- PAUSE MODAL -->
<div id="pauseScreen" class="modal-overlay hidden">
    <div class="pause-box">
        <div class="close-x" onclick="resumeGame()"></div>
        <div class="pause-title">PAUSED</div>
        <div class="pause-menu-item" onclick="resumeGame()">RESUME</div>
        <div class="pause-menu-item" onclick="restartBattle()">RESTART</div>
        <div class="pause-menu-item" onclick="quitToMenu()">QUIT</div>
    </div>
</div>

<!-- INFO MODAL -->
<div id="infoModal" class="modal-overlay hidden">
    <div class="modal-box jrpg-window">
        <div class="modal-header">BATTLEFIELD INFO</div>
        <div class="modal-body" id="infoModalBody" style="display:flex; gap:20px;"></div>
        <button class="menu-item" style="text-align: center; margin-top:20px;" onclick="closeModals()">Close</button>
    </div>
</div>

<!-- SCREEN 4: GAME OVER -->
<div id="gameoverScreen" class="screen">
    <div class="go-title" id="goTitle">—</div>
    <div class="go-sub" id="goSub">—</div>
    <div style="margin-top: 30px; display: flex; gap: 15px;">
        <button class="btn-start" onclick="playAgain()">▶ PLAY AGAIN</button>
        <button class="btn-start" onclick="quitToMenu()">MENU</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
